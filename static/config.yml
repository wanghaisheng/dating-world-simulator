meta:
  version: "2.5.0"

resources:
  locales_dir: static/locales/
  shared_game_configs_dir: static/game_configs/

llm:
  default_modes:
    action_decision: "normal"
    long_term_objective: "normal"
    nickname: "normal"
    single_choice: "normal"
    relation_resolver: "fast"
    relation_delta: "fast"
    story_teller: "fast"
    interaction_feedback: "fast"
    history_influence: "normal"
    backstory: "fast"
    custom_content_generation: "normal"
    random_minor_event: "fast"
    sect_random_event: "fast"
    sect_random_event_reason: "fast"
    sect_decider: "normal"
    sect_thinker: "fast"

ai:
  max_parse_retries: 3

game:
  mode: "cultivation"  # 默认修仙模式，可切换为 modern_romance
  init_npc_num: 9
  sect_num: 3 # init_npc_num大于sect_num时，会随机选择sect_num个宗门
  start_year: 100 # 世界开始年份
  npc_awakening_rate_per_month: 0.01

world:
  start_year: 100
  autonomous_creation_probability: 0.001
  autonomous_creation_story_probability: 0.5
  fortune_probability: 0.005
  misfortune_probability: 0.005
  random_minor_event_prob: 0.05
  birth_rate_per_month: 0.005
  max_children_per_couple: 2
  max_action_rounds_per_turn: 3
  long_dead_cleanup_years: 20
  gathering:
    auction_trigger_count: 5
    sect_teaching_prob: 0.05
    base_epiphany_prob: 0.02
  story:
    enabled: true
    probabilities:
      combat: 0.4
      relationship_major: 0.6
      cultivation_major: 0.40
      crafting: 0.10
      daily_social: 0.08
      sect_mission: 0.4
      world_fortune: 0.50
      world_misfortune: 0.35
      gathering: 1.0

sect:
  income_per_tile: 7
  influence_radius_divisor: 8
  influence_radius_bias: 1
  territory_distance_weight: 100
  territory_strength_weight: 12
  territory_noise_weight: 6
  territory_dense_border_threshold: 8
  random_event_prob_per_month: 0.03
  decision_interval_years: 3
  thinking_interval_years: 5
  recruit_cost: 500
  support_amount: 300
  member_upkeep_by_realm:
    QI_REFINEMENT: 15
    FOUNDATION_ESTABLISHMENT: 30
    CORE_FORMATION: 60
    NASCENT_SOUL: 120

avatar:
  persona_num: 3

social:
  major_event_context_num: 10
  minor_event_context_num: 10
  relation:
    min_friendliness: -100
    max_friendliness: 100
    yearly_regression: 2
    yearly_regression_with_identity: 1
    transition_hysteresis: 10
    transition_cooldown_months: 12
    thresholds:
      archenemy: -60
      disliked: -25
      friend: 25
      best_friend: 60
    llm_delta:
      min: -6
      max: 6
    identity_friendliness_floor:
      lovers: 20
      sworn_sibling: 20
      master_apprentice: 10
    action_modes:
      conversation: llm
      talk: llm
      gift: llm
      spar: llm
      gathering: llm
      random_minor_event: llm
    fixed_deltas:
      confess:
        accepted:
          a_to_b: 35
          b_to_a: 25
        rejected:
          a_to_b: -20
          b_to_a: -8
      dual_cultivation:
        accepted:
          a_to_b: 12
          b_to_a: 12
        rejected:
          a_to_b: -6
          b_to_a: -2
      swear_brotherhood:
        accepted:
          a_to_b: 22
          b_to_a: 22
        rejected:
          a_to_b: -10
          b_to_a: -4
      attack:
        started:
          a_to_b: -25
          b_to_a: -35
      impart:
        accepted:
          a_to_b: 8
          b_to_a: 12
        rejected:
          a_to_b: -4
          b_to_a: -2
      gathering:
        friendly:
          a_to_b: 4
          b_to_a: 4
        competitive:
          a_to_b: -6
          b_to_a: -8

nickname:
  major_event_threshold: 3
  minor_event_threshold: 25

save:
  max_events_to_save: 1000

frontend_defaults:
  water_speed: low
  cloud_freq: low

df:
  ids_separator: ";"

play:
  base_benefit_probability: 0.05
